name: pr-style

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  style-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            tf:
              - '**/*.tf'
      - name: Set up terraform
        if: ${{ steps.filter.outputs.tf == 'true' }}
        uses: hashicorp/setup-terraform@v4
      - name: Run the tf-checker
        if: ${{ steps.filter.outputs.tf == 'true' }}
        run: make tffmt-ci
